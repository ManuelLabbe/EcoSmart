AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EcoSmart POC — Metabase (EC2) + Athena + S3 + Glue + IoT Core (ESP32)

# ── Parámetros ─────────────────────────────────────────────────────────────────
Parameters:

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Nombre del Key Pair EC2 para acceso SSH

  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: IP o rango CIDR con acceso a Metabase y SSH (ej. tu IP/32)

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: Tipo de instancia EC2 (t3.micro = ~$0.02/hora)

# ── Recursos ───────────────────────────────────────────────────────────────────
Resources:

  # ── S3: datos de sensores ────────────────────────────────────────────────────
  SensorDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ecosmart-sensor-data-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldQueryResults
            Status: Enabled
            Prefix: query-results/
            ExpirationInDays: 7

  # ── IoT Core: Thing (ESP32) ─────────────────────────────────────────────────
  EcoSmartThing:
    Type: AWS::IoT::Thing
    Properties:
      ThingName: !Sub ecosmart-esp32-${AWS::AccountId}
      AttributePayload:
        Attributes:
          project: EcoSmart
          device_type: ESP32

  # ── IoT Core: Policy (permisos del dispositivo) ──────────────────────────────
  IoTDevicePolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: ecosmart-esp32-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:aws:iot:${AWS::Region}:${AWS::AccountId}:client/esp32-*
          - Effect: Allow
            Action: iot:Publish
            Resource:
              - !Sub arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/ecosmart/sensors/readings
              - !Sub arn:aws:iot:${AWS::Region}:${AWS::AccountId}:topic/ecosmart/sensors/alerts

  # ── IAM: rol para que IoT Rules escriban en S3 ───────────────────────────────
  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecosmart-iot-rule-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTRuleS3Write
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub ${SensorDataBucket.Arn}/*

  # ── IoT Rule: lecturas de sensores → S3 ─────────────────────────────────────
  #   Cada mensaje MQTT se almacena como un JSON en sensor_readings/
  #   El key usa substitution templates de IoT Core (no de CloudFormation)
  IoTRuleReadings:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: ecosmart_sensor_readings
      TopicRulePayload:
        Description: Guarda lecturas de sensores en S3
        Sql: "SELECT * FROM 'ecosmart/sensors/readings'"
        AwsIotSqlVersion: '2016-03-23'
        Actions:
          - S3:
              BucketName: !Ref SensorDataBucket
              Key: "sensor_readings/${equipment_id}/${timestamp()}.json"
              RoleArn: !GetAtt IoTRuleRole.Arn
        RuleDisabled: false

  # ── IoT Rule: alertas → S3 ───────────────────────────────────────────────────
  IoTRuleAlerts:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: ecosmart_sensor_alerts
      TopicRulePayload:
        Description: Guarda alertas de anomalías en S3
        Sql: "SELECT * FROM 'ecosmart/sensors/alerts'"
        AwsIotSqlVersion: '2016-03-23'
        Actions:
          - S3:
              BucketName: !Ref SensorDataBucket
              Key: "alerts/${equipment_id}/${timestamp()}.json"
              RoleArn: !GetAtt IoTRuleRole.Arn
        RuleDisabled: false

  # ── Glue: catálogo de datos ──────────────────────────────────────────────────
  SensorDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: ecosmart_sensors
        Description: Base de datos de sensores industriales EcoSmart

  # ── Athena: workgroup con output en S3 ──────────────────────────────────────
  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: ecosmart-workgroup
      Description: WorkGroup EcoSmart POC
      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: !Sub s3://${SensorDataBucket}/query-results/
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: false
        BytesScannedCutoffPerQuery: 104857600  # 100 MB max por query (safety)

  # ── IAM: rol para que EC2 acceda a Athena + S3 + Glue ───────────────────────
  MetabaseEC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecosmart-metabase-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonAthenaFullAccess
      Policies:
        - PolicyName: S3SensorDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt SensorDataBucket.Arn
                  - !Sub ${SensorDataBucket.Arn}/*
        - PolicyName: GlueReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetTables
                  - glue:GetPartition
                  - glue:GetPartitions
                Resource: '*'

  MetabaseInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: ecosmart-metabase-profile
      Roles:
        - !Ref MetabaseEC2Role

  # ── Security Group: puertos Metabase (3000) y SSH (22) ──────────────────────
  MetabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EcoSmart Metabase access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: !Ref AllowedCidr
          Description: Metabase web UI
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr
          Description: SSH

  # ── EC2: instancia con Metabase en Docker ────────────────────────────────────
  MetabaseInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      # Amazon Linux 2023 (latest) — resuelto via SSM Parameter Store
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref MetabaseInstanceProfile
      SecurityGroups:
        - !Ref MetabaseSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20      # 20 GB — ~$1.60/mes cuando EC2 está apagado
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          dnf update -y
          dnf install -y docker
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

          # Metabase CE en Docker — se reinicia solo al encender la instancia
          docker run -d \
            --name metabase \
            --restart unless-stopped \
            -p 3000:3000 \
            -v /home/ec2-user/metabase-data:/metabase-data \
            -e MB_DB_FILE=/metabase-data/metabase.db \
            metabase/metabase:latest

          # Guardar nombre del bucket como variable de entorno
          echo "SENSOR_BUCKET=${SensorDataBucket}" >> /etc/environment
          echo "ATHENA_WORKGROUP=ecosmart-workgroup" >> /etc/environment
          echo "AWS_DEFAULT_REGION=${AWS::Region}" >> /etc/environment
      Tags:
        - Key: Name
          Value: ecosmart-metabase
        - Key: Project
          Value: EcoSmart

  # ── IAM: rol para Lambda MCP ────────────────────────────────────────────────
  MCPLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecosmart-mcp-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AthenaS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt SensorDataBucket.Arn
                  - !Sub ${SensorDataBucket.Arn}/*
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetTables
                  - glue:GetPartitions
                Resource: '*'

  # ── Lambda: MCP server ───────────────────────────────────────────────────────
  MCPFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ecosmart-mcp-server
      Handler: handler.lambda_handler
      Runtime: python3.12
      CodeUri: mcp_lambda/
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt MCPLambdaRole.Arn
      Environment:
        Variables:
          ATHENA_WORKGROUP: ecosmart-workgroup
          S3_OUTPUT: !Sub s3://${SensorDataBucket}/query-results/
      Events:
        McpPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref MCPHttpApi
            Path: /mcp
            Method: POST
        McpOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref MCPHttpApi
            Path: /mcp
            Method: OPTIONS

  # ── API Gateway HTTP API ─────────────────────────────────────────────────────
  MCPHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

# ── Outputs ────────────────────────────────────────────────────────────────────
Outputs:

  MetabaseURL:
    Description: URL de Metabase (disponible ~3 min después de encender la instancia)
    Value: !Sub http://${MetabaseInstance.PublicDnsName}:3000

  MetabasePublicIP:
    Description: IP pública de la instancia (cambia al reiniciar)
    Value: !GetAtt MetabaseInstance.PublicIp

  SensorDataBucket:
    Description: Bucket S3 donde subir los datos de sensores
    Value: !Ref SensorDataBucket

  AthenaWorkGroup:
    Description: WorkGroup de Athena para queries
    Value: !Ref AthenaWorkGroup

  GlueDatabase:
    Description: Base de datos Glue / Athena
    Value: !Ref SensorDatabase

  SSHCommand:
    Description: Comando SSH para conectarse a la instancia
    Value: !Sub ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${MetabaseInstance.PublicDnsName}

  IoTThingArn:
    Description: ARN del Thing ESP32 en IoT Core
    Value: !Sub arn:aws:iot:${AWS::Region}:${AWS::AccountId}:thing/ecosmart-esp32-${AWS::AccountId}

  IoTThingName:
    Description: Nombre del Thing (para asociar el certificado)
    Value: !Sub ecosmart-esp32-${AWS::AccountId}

  IoTPolicyName:
    Description: Nombre de la Policy a adjuntar al certificado del ESP32
    Value: !Ref IoTDevicePolicy

  IoTEndpointCommand:
    Description: Comando para obtener el endpoint MQTT (pegar en sdkconfig.defaults)
    Value: aws iot describe-endpoint --endpoint-type iot:Data-ATS --query endpointAddress --output text

  MCPServerURL:
    Description: URL del MCP server (usar en Claude Code como mcp server URL)
    Value: !Sub https://${MCPHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/mcp

  IoTAttachCertCommand:
    Description: "Pasos post-deploy: (1) crear cert, (2) adjuntar policy y thing"
    Value: !Sub >-
      aws iot create-keys-and-certificate --set-as-active --certificate-pem-outfile main/certs/device_cert.pem --private-key-outfile main/certs/device_key.pem
      && aws iot attach-policy --policy-name ecosmart-esp32-policy --target <CERT_ARN>
      && aws iot attach-thing-principal --thing-name ecosmart-esp32-${AWS::AccountId} --principal <CERT_ARN>
